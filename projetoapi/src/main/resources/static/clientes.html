<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Clientes · Pro</title>
    <!-- Fonts e Ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="clientes.css">
</head>
<body>
<!-- Container principal -->
<div class="app-container">
    <!-- Cabeçalho -->
    <header class="app-header">
        <div class="header-content">
            <div class="logo-area">
                <i class="fas fa-users-between-lines"></i>
                <h1>Clientes Pro</h1>
            </div>
            <div class="header-actions">
                <button id="btnExportarExcel" class="btn btn-outline" title="Exportar para Excel (CSV)">
                    <i class="fas fa-file-excel"></i> Excel
                </button>
                <button id="btnGerarPDF" class="btn btn-outline" title="Exportar para PDF">
                    <i class="fas fa-file-pdf"></i> PDF
                </button>
                <button id="btnNovoCliente" class="btn btn-primary">
                    <i class="fas fa-plus-circle"></i> Novo Cliente
                </button>
            </div>
        </div>
    </header>

    <!-- Dashboard resumo -->
    <div class="stats-wrapper">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div class="stat-info">
                <span class="stat-label">Total de clientes</span>
                <span id="totalClientes" class="stat-value">0</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-envelope"></i></div>
            <div class="stat-info">
                <span class="stat-label">E-mails únicos</span>
                <span id="totalEmails" class="stat-value">0</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-phone"></i></div>
            <div class="stat-info">
                <span class="stat-label">Com telefone</span>
                <span id="comTelefone" class="stat-value">0</span>
            </div>
        </div>
    </div>

    <!-- Barra de ferramentas: busca -->
    <div class="toolbar">
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="inputBusca" class="search-input" placeholder="Buscar por nome, e-mail ou telefone...">
            <button id="btnLimparBusca" class="clear-search" style="display: none;"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- Tabela de clientes -->
    <div class="table-wrapper">
        <table id="tabelaClientes" class="clientes-table">
            <thead>
            <tr>
                <th data-sort="nome" class="sortable">Nome <i class="fas fa-sort"></i></th>
                <th data-sort="email" class="sortable">E-mail <i class="fas fa-sort"></i></th>
                <th data-sort="telefone" class="sortable">Telefone <i class="fas fa-sort"></i></th>
                <th style="width: 120px;">Ações</th>
            </tr>
            </thead>
            <tbody id="clientesTableBody"></tbody>
        </table>

        <!-- Estados de carregamento / vazio -->
        <div id="loadingIndicator" class="loading">Carregando clientes...</div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-user-slash"></i>
            <p>Nenhum cliente encontrado.</p>
        </div>

        <!-- Paginação -->
        <div id="paginacaoContainer" class="pagination-container" style="display: none;">
            <div class="pagination-info">
                Mostrando <span id="rangeInicio">1</span> a <span id="rangeFim">10</span> de <span id="totalRegistros">0</span> clientes
            </div>
            <div class="pagination-controls">
                <button id="btnPaginaAnterior" class="pagination-btn" disabled><i class="fas fa-chevron-left"></i></button>
                <span id="paginaAtual" class="pagination-current">1</span>
                <button id="btnPaginaProxima" class="pagination-btn" disabled><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Formulário de Cliente -->
<div id="clienteModal" class="modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Novo Cliente</h3>
                <button class="modal-close" aria-label="Fechar">&times;</button>
            </div>
            <form id="clienteForm">
                <input type="hidden" id="clienteId" name="id">
                <div class="form-group">
                    <label for="nome">Nome completo <span class="required">*</span></label>
                    <input type="text" id="nome" name="nome" class="form-control" placeholder="Ex: João da Silva" required>
                    <div class="error-message" data-for="nome"></div>
                </div>
                <div class="form-group">
                    <label for="email">E-mail <span class="required">*</span></label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="joao@email.com" required>
                    <div class="error-message" data-for="email"></div>
                </div>
                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" name="telefone" class="form-control" placeholder="(11) 99999-9999">
                    <div class="error-message" data-for="telefone"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btnCancelarModal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal: Confirmação de exclusão -->
<div id="confirmModal" class="modal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Confirmar exclusão</h3>
                <button class="modal-close" aria-label="Fechar">&times;</button>
            </div>
            <div class="modal-body">
                <p>Tem certeza que deseja excluir o cliente <strong id="nomeClienteExcluir"></strong>?</p>
                <p class="text-muted">Esta ação não pode ser desfeita.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="btnCancelarExclusao">Cancelar</button>
                <button type="button" class="btn btn-danger" id="btnConfirmarExclusao">Excluir</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast container -->
<div id="toastContainer" class="toast-container"></div>

<!-- Scripts externos -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="clientes.js"></script>
</body>
</html>
